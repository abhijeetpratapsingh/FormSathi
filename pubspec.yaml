name: formsathi
description: Offline form-filling companion for saving personal details, documents, photo resize, compression, and image-to-PDF conversion.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.11.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7
  get_it: ^8.0.3
  go_router: ^16.2.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5
  image_picker: ^1.1.2
  image: ^4.5.4
  share_plus: ^11.0.0
  permission_handler: ^12.0.1
  pdf: ^3.11.3
  printing: ^5.14.2
  intl: ^0.20.2
  uuid: ^4.5.1
  collection: ^1.19.1
  path: ^1.9.1
  cross_file: ^0.3.4+2
  google_fonts: ^6.3.0
  flutter_secure_storage: ^10.0.0
  file_picker: ^11.0.2
  crop_your_image: ^2.0.0
  crypto: ^3.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/formsathi-logo-white-bg.png
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/images/formsathi-logo.png
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/formsathi-logo.png
